            },
            {
                turkish: "Biz akşam yemeği yeriz.", targetText: "We eat dinner", correctPattern: ["subject", "verb", "object"], showObj: true,
                words: [
                    { id: "w1", text: "We", type: "subject" }, { id: "w2", text: "eat", type: "verb" }, { id: "w3", text: "dinner", type: "object" },
                    { id: "w4", text: "They", type: "subject" }, { id: "w5", text: "cook", type: "verb" }, { id: "w6", text: "breakfast", type: "object" }
                ]
            },
            {
                turkish: "O (kadın) şehri sever.", targetText: "She loves the city", correctPattern: ["subject", "verb", "object"], showObj: true,
                words: [
                    { id: "w1", text: "She", type: "subject" }, { id: "w2", text: "loves", type: "verb" }, { id: "w3", text: "the city", type: "object" },
                    { id: "w4", text: "He", type: "subject" }, { id: "w5", text: "hates", type: "verb" }, { id: "w6", text: "the village", type: "object" }
                ]
            },
            {
                turkish: "Ben İngilizce öğrenirim.", targetText: "I learn English", correctPattern: ["subject", "verb", "object"], showObj: true,
                words: [
                    { id: "w1", text: "I", type: "subject" }, { id: "w2", text: "learn", type: "verb" }, { id: "w3", text: "English", type: "object" },
                    { id: "w4", text: "You", type: "subject" }, { id: "w5", text: "speak", type: "verb" }, { id: "w6", text: "Turkish", type: "object" }
                ]
            }
        ];

        let currentLevelIndex = 0;
        const sentenceZone = document.getElementById('sentence-zone');
        const wordBank = document.getElementById('word-bank');
        
        const typeStyles = {
            subject: 'bg-subject border-blue-700 text-white shadow-md hover:bg-blue-600',
            verb: 'bg-verb border-red-700 text-white shadow-md hover:bg-red-600',
            object: 'bg-object border-emerald-700 text-white shadow-md hover:bg-emerald-600'
        };

        function startGame() {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('game-interface').classList.remove('hidden');
            renderLevel(currentLevelIndex);
        }

        function renderLevel(index) {
            const level = levels[index];
            document.getElementById('current-level').innerText = index + 1;
            document.getElementById('target-sentence').innerText = level.turkish;
            
            // Update Navigation Buttons
            document.getElementById('prev-btn').disabled = index === 0;
            document.getElementById('next-btn').disabled = index === levels.length - 1;

            // Toggle object legend for level 3 onwards
            const objLegend = document.getElementById('object-legend');
            if (level.showObj) {
                objLegend.classList.remove('hidden');
            } else {
                objLegend.classList.add('hidden');
            }

            // Clear zones
            sentenceZone.innerHTML = '';
            wordBank.innerHTML = '';
            sentenceZone.className = "drop-zone w-full min-h-[100px] border-4 border-dashed border-slate-200 rounded-xl p-4 flex flex-wrap content-start gap-3 bg-slate-50 shadow-inner";

            // Render words shuffled (distractors included)
            let shuffledWords = [...level.words].sort(() => Math.random() - 0.5);
            
            shuffledWords.forEach(word => {
                const block = document.createElement('div');
                block.id = word.id;
                block.dataset.type = word.type;
                block.innerText = word.text;
                block.className = `word-block px-4 py-2 md:px-5 md:py-3 rounded-lg border-b-4 font-bold text-base md:text-lg ${typeStyles[word.type]}`;
                
                // Drag interactions
                block.draggable = true;
                block.addEventListener('dragstart', handleDragStart);
                block.addEventListener('dragend', handleDragEnd);
                
                // Touch/Click interactions
                block.addEventListener('click', handleBlockClick);

                wordBank.appendChild(block);
            });
        }

        let draggedElement = null;

        function handleDragStart(e) {
            if (!this.draggable) return;
            draggedElement = this;
            setTimeout(() => this.classList.add('dragging'), 0);
            e.dataTransfer.setData('text/plain', this.id);
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
            draggedElement = null;
        }

        const dropZones = [sentenceZone, wordBank];
        
        dropZones.forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                e.preventDefault();
                zone.classList.add('drag-over');
            });

            zone.addEventListener('dragleave', () => {
                zone.classList.remove('drag-over');
            });

            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('drag-over');
                
                const id = e.dataTransfer.getData('text/plain');
                const draggable = document.getElementById(id);
                
                if (draggable && draggable.draggable) {
                    zone.appendChild(draggable);
                    checkSentence();
                }
            });
        });

        function handleBlockClick(e) {
            const block = e.target;
            if (!block.draggable) return;

            if (block.parentElement.id === 'word-bank') {
                sentenceZone.appendChild(block);
            } else if (block.parentElement.id === 'sentence-zone') {
                wordBank.appendChild(block);
            }
            checkSentence();
        }

        function checkSentence() {
            const level = levels[currentLevelIndex];
            const placedBlocks = Array.from(sentenceZone.children);
            
            // Only evaluate if they placed the correct NUMBER of words
            if (placedBlocks.length < level.correctPattern.length) {
                sentenceZone.classList.remove('pop-success', 'border-emerald-500');
                return; 
            }

            const userText = placedBlocks.map(block => block.innerText).join(' ');
            const userPattern = placedBlocks.map(block => block.dataset.type).join(',');
            
            // Validation 1: Exact string match (Success)
            if (userText === level.targetText) {
                handleSuccess();
                return;
            }

            // Validation 2: Did they use the right structure but wrong words?
            const correctPatternStr = level.correctPattern.join(',');
            if (userPattern === correctPatternStr && placedBlocks.length === level.correctPattern.length) {
                showToast("Perfect structure! But you picked the wrong words.", "error");
                handleError();
                return;
            }

            // Validation 3: The Turklish Trapdoor (S-O-V)
            if (userPattern === "subject,object,verb" || userPattern.includes("object,verb")) {
                showToast("🇹🇷 Turklish Detected! Action (Red) comes BEFORE Object (Green).", "error");
                handleError();
                return;
            }

            // Validation 4: Verb first error
            if (userPattern.startsWith("verb")) {
                showToast("Oops! The Person (Blue) must come first.", "error");
                handleError();
                return;
            }

            // Fallback for random wrong placements (only flag if they matched length)
            if (placedBlocks.length >= level.correctPattern.length) {
                showToast("Not quite right. Look at the colors!", "error");
                handleError();
            }
        }

        function handleSuccess() {
            sentenceZone.classList.add('pop-success');
            showToast("Perfect English! 🎉", "success");
            
            // Lock UI for the successful blocks
            Array.from(sentenceZone.children).forEach(block => {
                block.draggable = false;
                block.classList.remove('cursor-grab', 'hover:bg-blue-600', 'hover:bg-red-600', 'hover:bg-emerald-600');
                block.classList.add('cursor-default', 'opacity-90');
            });

            // Auto advance after short delay if not last level
            setTimeout(() => {
                if (currentLevelIndex < levels.length - 1) {
                    nextLevel();
                } else {
                    sentenceZone.innerHTML = `<div class="w-full text-center py-6 text-emerald-600 font-extrabold text-2xl">🎉 Amazing job! You've mastered Phase 1!</div>`;
                    document.getElementById('word-bank').innerHTML = '';
                }
            }, 1800);
        }

        function handleError() {
            sentenceZone.classList.add('shake');
            setTimeout(() => {
                sentenceZone.classList.remove('shake');
            }, 400);
        }

        function nextLevel() {
            if (currentLevelIndex < levels.length - 1) {
                currentLevelIndex++;
                renderLevel(currentLevelIndex);
            }
        }

        function prevLevel() {
            if (currentLevelIndex > 0) {
                currentLevelIndex--;
                renderLevel(currentLevelIndex);
            }
        }

        function resetLevel() {
            renderLevel(currentLevelIndex);
        }

        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bgClass = type === 'success' ? 'bg-emerald-500' : 'bg-rose-500';
            toast.className = `toast ${bgClass} flex items-center gap-3`;
            
            const icon = type === 'success' 
                ? `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`
                : `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            
            toast.innerHTML = `${icon} <span class="text-sm md:text-base">${message}</span>`;
            
            container.appendChild(toast);
            
            // Animate in
            setTimeout(() => toast.classList.add('show'), 10);
            
            // Remove after 3.5 seconds
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }
    </script>
</body>
</html>
